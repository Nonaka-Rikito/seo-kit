<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Prompt Library</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg-primary:#f0f2f5;
    --bg-card:#fff;
    --bg-input:#f8f9fa;
    --text-primary:#1a1a2e;
    --text-secondary:#555;
    --text-muted:#888;
    --border:#e0e0e0;
    --accent:#6c5ce7;
    --accent-hover:#5a4bd1;
    --accent-light:rgba(108,92,231,.1);
    --danger:#e74c3c;
    --danger-hover:#c0392b;
    --shadow:0 2px 12px rgba(0,0,0,.08);
    --shadow-lg:0 8px 32px rgba(0,0,0,.12);
    --radius:12px;
    --gradient:linear-gradient(135deg,#6c5ce7 0%,#a29bfe 50%,#74b9ff 100%);
    --toast-bg:#333;
    --toast-text:#fff;
    --modal-overlay:rgba(0,0,0,.5);
    --category-work:#6c5ce7;
    --category-study:#00b894;
    --category-creative:#e17055;
    --category-life:#fdcb6e;
    --category-other:#636e72;
  }
  [data-theme="dark"]{
    --bg-primary:#0f0f1a;
    --bg-card:#1a1a2e;
    --bg-input:#16213e;
    --text-primary:#e0e0e0;
    --text-secondary:#aaa;
    --text-muted:#777;
    --border:#2a2a4a;
    --accent:#a29bfe;
    --accent-hover:#6c5ce7;
    --accent-light:rgba(162,155,254,.15);
    --shadow:0 2px 12px rgba(0,0,0,.3);
    --shadow-lg:0 8px 32px rgba(0,0,0,.4);
    --toast-bg:#e0e0e0;
    --toast-text:#1a1a2e;
    --modal-overlay:rgba(0,0,0,.7);
  }
  body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans JP',sans-serif;
    background:var(--bg-primary);
    color:var(--text-primary);
    min-height:100vh;
    transition:background .3s,color .3s;
  }

  /* Header */
  .header{
    background:var(--gradient);
    padding:2rem 1rem 3rem;
    text-align:center;
    position:relative;
  }
  .header h1{
    color:#fff;
    font-size:1.8rem;
    font-weight:700;
    margin-bottom:.3rem;
    letter-spacing:-.02em;
  }
  .header p{
    color:rgba(255,255,255,.85);
    font-size:.95rem;
  }
  .theme-toggle{
    position:absolute;
    top:1rem;
    right:1rem;
    background:rgba(255,255,255,.2);
    border:none;
    color:#fff;
    width:40px;height:40px;
    border-radius:50%;
    cursor:pointer;
    font-size:1.2rem;
    display:flex;align-items:center;justify-content:center;
    transition:background .2s;
    backdrop-filter:blur(4px);
  }
  .theme-toggle:hover{background:rgba(255,255,255,.35)}

  /* Main Container */
  .container{
    max-width:800px;
    margin:-1.5rem auto 2rem;
    padding:0 1rem;
  }

  /* Toolbar */
  .toolbar{
    display:flex;
    gap:.5rem;
    flex-wrap:wrap;
    align-items:center;
    margin-bottom:1rem;
  }
  .search-box{
    flex:1;
    min-width:180px;
    padding:.65rem 1rem .65rem 2.4rem;
    border:1px solid var(--border);
    border-radius:var(--radius);
    background:var(--bg-card);
    color:var(--text-primary);
    font-size:.9rem;
    outline:none;
    transition:border .2s;
  }
  .search-box:focus{border-color:var(--accent)}
  .search-wrapper{position:relative;flex:1;min-width:180px}
  .search-icon{
    position:absolute;left:.8rem;top:50%;transform:translateY(-50%);
    color:var(--text-muted);font-size:.9rem;pointer-events:none;
  }
  .search-wrapper .search-box{width:100%}
  .filter-select{
    padding:.65rem .8rem;
    border:1px solid var(--border);
    border-radius:var(--radius);
    background:var(--bg-card);
    color:var(--text-primary);
    font-size:.85rem;
    outline:none;
    cursor:pointer;
  }
  .btn-add{
    padding:.65rem 1.2rem;
    background:var(--accent);
    color:#fff;
    border:none;
    border-radius:var(--radius);
    font-size:.9rem;
    font-weight:600;
    cursor:pointer;
    transition:background .2s,transform .1s;
    white-space:nowrap;
  }
  .btn-add:hover{background:var(--accent-hover)}
  .btn-add:active{transform:scale(.97)}

  /* Stats */
  .stats{
    font-size:.8rem;
    color:var(--text-muted);
    margin-bottom:.8rem;
    padding:0 .2rem;
  }

  /* Cards */
  .prompt-list{display:flex;flex-direction:column;gap:.75rem}
  .prompt-card{
    background:var(--bg-card);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:1.2rem;
    box-shadow:var(--shadow);
    transition:transform .15s,box-shadow .15s;
    animation:fadeIn .3s ease;
  }
  .prompt-card:hover{transform:translateY(-1px);box-shadow:var(--shadow-lg)}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .card-header{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:.5rem;
    margin-bottom:.6rem;
  }
  .card-title{
    font-size:1.05rem;
    font-weight:600;
    line-height:1.3;
    flex:1;
  }
  .card-category{
    font-size:.7rem;
    font-weight:600;
    padding:.2rem .6rem;
    border-radius:20px;
    color:#fff;
    white-space:nowrap;
    flex-shrink:0;
  }
  .cat-仕事{background:var(--category-work)}
  .cat-学習{background:var(--category-study)}
  .cat-クリエイティブ{background:var(--category-creative)}
  .cat-生活{background:var(--category-life)}
  .cat-その他{background:var(--category-other)}
  .card-body{
    font-size:.88rem;
    color:var(--text-secondary);
    line-height:1.65;
    white-space:pre-wrap;
    word-break:break-word;
    margin-bottom:.8rem;
    max-height:150px;
    overflow:hidden;
    position:relative;
  }
  .card-body.expanded{max-height:none}
  .card-body:not(.expanded)::after{
    content:'';
    position:absolute;
    bottom:0;left:0;right:0;
    height:40px;
    background:linear-gradient(transparent,var(--bg-card));
    pointer-events:none;
  }
  .card-body.short::after{display:none}
  .btn-expand{
    background:none;border:none;color:var(--accent);
    font-size:.8rem;cursor:pointer;padding:0;margin-bottom:.6rem;
  }
  .btn-expand:hover{text-decoration:underline}
  .card-actions{
    display:flex;
    gap:.4rem;
    flex-wrap:wrap;
  }
  .card-actions button{
    padding:.35rem .7rem;
    border:1px solid var(--border);
    border-radius:8px;
    background:var(--bg-input);
    color:var(--text-secondary);
    font-size:.78rem;
    cursor:pointer;
    transition:all .15s;
    display:flex;align-items:center;gap:.3rem;
  }
  .card-actions button:hover{
    border-color:var(--accent);
    color:var(--accent);
    background:var(--accent-light);
  }
  .card-actions .btn-delete:hover{
    border-color:var(--danger);
    color:var(--danger);
    background:rgba(231,76,60,.08);
  }
  .card-date{
    margin-left:auto;
    font-size:.72rem;
    color:var(--text-muted);
    align-self:center;
  }

  /* Empty State */
  .empty-state{
    text-align:center;
    padding:3rem 1rem;
    color:var(--text-muted);
  }
  .empty-state .icon{font-size:3rem;margin-bottom:.8rem}
  .empty-state h3{font-size:1.1rem;margin-bottom:.3rem;color:var(--text-secondary)}
  .empty-state p{font-size:.85rem}

  /* Modal */
  .modal-overlay{
    position:fixed;inset:0;
    background:var(--modal-overlay);
    display:flex;align-items:center;justify-content:center;
    z-index:1000;
    padding:1rem;
    opacity:0;visibility:hidden;
    transition:opacity .2s,visibility .2s;
  }
  .modal-overlay.active{opacity:1;visibility:visible}
  .modal{
    background:var(--bg-card);
    border-radius:var(--radius);
    width:100%;
    max-width:560px;
    max-height:90vh;
    overflow-y:auto;
    box-shadow:var(--shadow-lg);
    transform:translateY(20px);
    transition:transform .2s;
  }
  .modal-overlay.active .modal{transform:translateY(0)}
  .modal-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:1.2rem 1.5rem;
    border-bottom:1px solid var(--border);
  }
  .modal-header h2{font-size:1.15rem;font-weight:600}
  .modal-close{
    background:none;border:none;
    font-size:1.4rem;color:var(--text-muted);
    cursor:pointer;padding:.2rem;line-height:1;
  }
  .modal-close:hover{color:var(--text-primary)}
  .modal-body{padding:1.5rem}
  .form-group{margin-bottom:1.1rem}
  .form-group label{
    display:block;
    font-size:.85rem;
    font-weight:600;
    margin-bottom:.4rem;
    color:var(--text-secondary);
  }
  .form-group input,
  .form-group select,
  .form-group textarea{
    width:100%;
    padding:.7rem .9rem;
    border:1px solid var(--border);
    border-radius:8px;
    background:var(--bg-input);
    color:var(--text-primary);
    font-size:.9rem;
    font-family:inherit;
    outline:none;
    transition:border .2s;
  }
  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus{border-color:var(--accent)}
  .form-group textarea{
    min-height:180px;
    resize:vertical;
    line-height:1.6;
  }
  .modal-footer{
    display:flex;
    gap:.5rem;
    justify-content:flex-end;
    padding:0 1.5rem 1.5rem;
  }
  .btn-cancel{
    padding:.6rem 1.2rem;
    border:1px solid var(--border);
    border-radius:8px;
    background:var(--bg-input);
    color:var(--text-secondary);
    font-size:.88rem;
    cursor:pointer;
    transition:all .15s;
  }
  .btn-cancel:hover{border-color:var(--text-muted)}
  .btn-save{
    padding:.6rem 1.5rem;
    border:none;
    border-radius:8px;
    background:var(--accent);
    color:#fff;
    font-size:.88rem;
    font-weight:600;
    cursor:pointer;
    transition:background .2s;
  }
  .btn-save:hover{background:var(--accent-hover)}

  /* Toast */
  .toast{
    position:fixed;
    bottom:1.5rem;
    left:50%;
    transform:translateX(-50%) translateY(80px);
    background:var(--toast-bg);
    color:var(--toast-text);
    padding:.7rem 1.3rem;
    border-radius:8px;
    font-size:.85rem;
    box-shadow:0 4px 20px rgba(0,0,0,.2);
    z-index:2000;
    transition:transform .3s ease;
    pointer-events:none;
  }
  .toast.show{transform:translateX(-50%) translateY(0)}

  /* Confirm Dialog */
  .confirm-overlay{
    position:fixed;inset:0;
    background:var(--modal-overlay);
    display:flex;align-items:center;justify-content:center;
    z-index:1100;padding:1rem;
    opacity:0;visibility:hidden;transition:opacity .2s,visibility .2s;
  }
  .confirm-overlay.active{opacity:1;visibility:visible}
  .confirm-box{
    background:var(--bg-card);border-radius:var(--radius);
    padding:1.5rem;width:100%;max-width:360px;
    box-shadow:var(--shadow-lg);text-align:center;
  }
  .confirm-box p{font-size:.95rem;margin-bottom:1.2rem;line-height:1.5}
  .confirm-actions{display:flex;gap:.5rem;justify-content:center}

  /* Responsive */
  @media(max-width:600px){
    .header h1{font-size:1.4rem}
    .header p{font-size:.85rem}
    .toolbar{flex-direction:column}
    .search-wrapper{min-width:100%}
    .toolbar .filter-select,.toolbar .btn-add{width:100%}
    .card-actions{gap:.3rem}
    .card-date{margin-left:0;margin-top:.3rem;width:100%;text-align:right}
  }
</style>
</head>
<body>

<header class="header">
  <h1>My Prompt Library</h1>
  <p>お気に入りのプロンプトを保存・整理</p>
  <button class="theme-toggle" id="themeToggle" title="テーマ切替">☀️</button>
</header>

<main class="container">
  <div class="toolbar">
    <div class="search-wrapper">
      <span class="search-icon">🔍</span>
      <input type="text" class="search-box" id="searchBox" placeholder="プロンプトを検索...">
    </div>
    <select class="filter-select" id="filterCategory">
      <option value="all">すべてのカテゴリ</option>
      <option value="仕事">仕事</option>
      <option value="学習">学習</option>
      <option value="クリエイティブ">クリエイティブ</option>
      <option value="生活">生活</option>
      <option value="その他">その他</option>
    </select>
    <button class="btn-add" id="btnAdd">＋ 新規追加</button>
  </div>

  <div class="stats" id="stats"></div>
  <div class="prompt-list" id="promptList"></div>
</main>

<!-- Add / Edit Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">プロンプトを追加</h2>
      <button class="modal-close" id="modalClose">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label for="inputTitle">タイトル</label>
        <input type="text" id="inputTitle" placeholder="例: ブログ記事の構成案を作成">
      </div>
      <div class="form-group">
        <label for="inputCategory">カテゴリ</label>
        <select id="inputCategory">
          <option value="仕事">仕事</option>
          <option value="学習">学習</option>
          <option value="クリエイティブ">クリエイティブ</option>
          <option value="生活">生活</option>
          <option value="その他">その他</option>
        </select>
      </div>
      <div class="form-group">
        <label for="inputBody">プロンプト本文</label>
        <textarea id="inputBody" placeholder="プロンプトの内容を入力してください..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" id="btnCancel">キャンセル</button>
      <button class="btn-save" id="btnSave">保存</button>
    </div>
  </div>
</div>

<!-- Confirm Dialog -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <p id="confirmMessage">このプロンプトを削除しますか？</p>
    <div class="confirm-actions">
      <button class="btn-cancel" id="confirmNo">キャンセル</button>
      <button class="btn-save" id="confirmYes" style="background:var(--danger)">削除</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
(function() {
  const STORAGE_KEY = 'myPromptLibrary';
  const THEME_KEY = 'myPromptLibraryTheme';

  // DOM
  const $ = id => document.getElementById(id);
  const themeToggle = $('themeToggle');
  const searchBox = $('searchBox');
  const filterCategory = $('filterCategory');
  const btnAdd = $('btnAdd');
  const modalOverlay = $('modalOverlay');
  const modalTitle = $('modalTitle');
  const modalClose = $('modalClose');
  const inputTitle = $('inputTitle');
  const inputCategory = $('inputCategory');
  const inputBody = $('inputBody');
  const btnCancel = $('btnCancel');
  const btnSave = $('btnSave');
  const promptList = $('promptList');
  const stats = $('stats');
  const confirmOverlay = $('confirmOverlay');
  const confirmYes = $('confirmYes');
  const confirmNo = $('confirmNo');
  const toast = $('toast');

  let prompts = [];
  let editingId = null;
  let pendingDeleteId = null;

  // --- Theme ---
  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    themeToggle.textContent = theme === 'dark' ? '🌙' : '☀️';
    localStorage.setItem(THEME_KEY, theme);
  }
  function toggleTheme() {
    const current = document.documentElement.getAttribute('data-theme');
    applyTheme(current === 'dark' ? 'light' : 'dark');
  }
  (function initTheme() {
    const saved = localStorage.getItem(THEME_KEY);
    if (saved) { applyTheme(saved); return; }
    if (window.matchMedia('(prefers-color-scheme: dark)').matches) applyTheme('dark');
    else applyTheme('light');
  })();
  themeToggle.addEventListener('click', toggleTheme);

  // --- Data ---
  function load() {
    try { prompts = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch { prompts = []; }
  }
  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(prompts));
  }

  // --- Toast ---
  let toastTimer;
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
  }

  // --- Modal ---
  function openModal(id) {
    editingId = id || null;
    if (editingId) {
      const p = prompts.find(x => x.id === editingId);
      if (!p) return;
      modalTitle.textContent = 'プロンプトを編集';
      inputTitle.value = p.title;
      inputCategory.value = p.category;
      inputBody.value = p.body;
      btnSave.textContent = '更新';
    } else {
      modalTitle.textContent = 'プロンプトを追加';
      inputTitle.value = '';
      inputCategory.value = '仕事';
      inputBody.value = '';
      btnSave.textContent = '保存';
    }
    modalOverlay.classList.add('active');
    setTimeout(() => inputTitle.focus(), 100);
  }
  function closeModal() {
    modalOverlay.classList.remove('active');
    editingId = null;
  }

  // --- Confirm ---
  function openConfirm(id) {
    pendingDeleteId = id;
    confirmOverlay.classList.add('active');
  }
  function closeConfirm() {
    confirmOverlay.classList.remove('active');
    pendingDeleteId = null;
  }

  // --- CRUD ---
  function addPrompt(title, category, body) {
    prompts.unshift({
      id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
      title, category, body,
      createdAt: new Date().toISOString(),
      updatedAt: new Date().toISOString()
    });
    save();
  }
  function updatePrompt(id, title, category, body) {
    const p = prompts.find(x => x.id === id);
    if (!p) return;
    p.title = title;
    p.category = category;
    p.body = body;
    p.updatedAt = new Date().toISOString();
    save();
  }
  function deletePrompt(id) {
    prompts = prompts.filter(x => x.id !== id);
    save();
  }

  // --- Render ---
  function getFiltered() {
    const q = searchBox.value.trim().toLowerCase();
    const cat = filterCategory.value;
    return prompts.filter(p => {
      if (cat !== 'all' && p.category !== cat) return false;
      if (q && !p.title.toLowerCase().includes(q) && !p.body.toLowerCase().includes(q)) return false;
      return true;
    });
  }

  function formatDate(iso) {
    const d = new Date(iso);
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    const h = String(d.getHours()).padStart(2, '0');
    const min = String(d.getMinutes()).padStart(2, '0');
    return `${y}/${m}/${day} ${h}:${min}`;
  }

  function render() {
    const filtered = getFiltered();
    stats.textContent = `${filtered.length} 件のプロンプト` + (prompts.length !== filtered.length ? ` / 全 ${prompts.length} 件` : '');

    if (filtered.length === 0) {
      promptList.innerHTML = `
        <div class="empty-state">
          <div class="icon">📝</div>
          <h3>${prompts.length === 0 ? 'プロンプトがありません' : '該当するプロンプトがありません'}</h3>
          <p>${prompts.length === 0 ? '「＋ 新規追加」ボタンから最初のプロンプトを追加しましょう' : '検索条件やカテゴリを変更してみてください'}</p>
        </div>`;
      return;
    }

    promptList.innerHTML = filtered.map(p => {
      const escaped = esc(p.body);
      const isLong = p.body.split('\n').length > 6 || p.body.length > 300;
      return `
      <div class="prompt-card" data-id="${p.id}">
        <div class="card-header">
          <div class="card-title">${esc(p.title)}</div>
          <span class="card-category cat-${p.category}">${p.category}</span>
        </div>
        <div class="card-body ${isLong ? '' : 'short'}" id="body-${p.id}">${escaped}</div>
        ${isLong ? `<button class="btn-expand" data-target="${p.id}">もっと見る</button>` : ''}
        <div class="card-actions">
          <button data-copy="${p.id}">📋 コピー</button>
          <button data-edit="${p.id}">✏️ 編集</button>
          <button class="btn-delete" data-delete="${p.id}">🗑️ 削除</button>
          <span class="card-date">${formatDate(p.updatedAt)}</span>
        </div>
      </div>`;
    }).join('');
  }

  function esc(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  // --- Events ---
  btnAdd.addEventListener('click', () => openModal(null));
  modalClose.addEventListener('click', closeModal);
  btnCancel.addEventListener('click', closeModal);
  modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) closeModal(); });
  confirmNo.addEventListener('click', closeConfirm);
  confirmOverlay.addEventListener('click', e => { if (e.target === confirmOverlay) closeConfirm(); });

  btnSave.addEventListener('click', () => {
    const title = inputTitle.value.trim();
    const category = inputCategory.value;
    const body = inputBody.value.trim();
    if (!title) { inputTitle.focus(); showToast('タイトルを入力してください'); return; }
    if (!body) { inputBody.focus(); showToast('プロンプト本文を入力してください'); return; }
    if (editingId) {
      updatePrompt(editingId, title, category, body);
      showToast('プロンプトを更新しました');
    } else {
      addPrompt(title, category, body);
      showToast('プロンプトを追加しました');
    }
    closeModal();
    render();
  });

  confirmYes.addEventListener('click', () => {
    if (pendingDeleteId) {
      deletePrompt(pendingDeleteId);
      showToast('プロンプトを削除しました');
      render();
    }
    closeConfirm();
  });

  promptList.addEventListener('click', e => {
    const btn = e.target.closest('button');
    if (!btn) return;
    const copyId = btn.dataset.copy;
    const editId = btn.dataset.edit;
    const deleteId = btn.dataset.delete;
    const expandTarget = btn.dataset.target;

    if (copyId) {
      const p = prompts.find(x => x.id === copyId);
      if (p) {
        navigator.clipboard.writeText(p.body).then(() => showToast('コピーしました'));
      }
    }
    if (editId) openModal(editId);
    if (deleteId) openConfirm(deleteId);
    if (expandTarget) {
      const bodyEl = document.getElementById('body-' + expandTarget);
      if (bodyEl) {
        const expanded = bodyEl.classList.toggle('expanded');
        btn.textContent = expanded ? '閉じる' : 'もっと見る';
      }
    }
  });

  searchBox.addEventListener('input', render);
  filterCategory.addEventListener('change', render);

  // Keyboard shortcuts
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      if (confirmOverlay.classList.contains('active')) closeConfirm();
      else if (modalOverlay.classList.contains('active')) closeModal();
    }
  });

  // --- Init ---
  load();
  render();
})();
</script>
</body>
</html>
